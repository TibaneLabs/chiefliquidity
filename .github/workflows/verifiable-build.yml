name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer one starts for the same ref+event,
# so pushes don't pile up stale runs competing for runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: v2.0.25

jobs:
  unit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # protobuf-compiler: needed by solana-svm's build script (transitive
        # dev-dependency via solana-program-test).
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase

      - name: Run host unit tests
        run: cargo test --lib --workspace --locked

      - name: Build SBF program
        run: cargo build-sbf --workspace -- --locked

      - name: Run integration tests (separate workspace)
        # integration-tests/ is its own cargo project so its heavy
        # solana-program-test dev-dep tree doesn't pollute the lib's
        # Cargo.lock that solana-verify resolves with cargo 1.78.
        working-directory: integration-tests
        run: cargo test --locked

      - name: Start test validator with upgradeable program
        run: |
          solana config set --url http://localhost:8899 --keypair ~/.config/solana/id.json
          solana-test-validator \
            --ledger test-ledger \
            --rpc-port 8899 \
            --faucet-port 9900 \
            --slots-per-epoch 32 \
            --upgradeable-program ChiefQnUMyz7V1U9odcoxCar66ngVZn1wXFDecnN7yQw target/deploy/chiefliquidity.so ~/.config/solana/id.json \
            --log &
          sleep 5

      - name: Verify program loaded
        run: solana program show ChiefQnUMyz7V1U9odcoxCar66ngVZn1wXFDecnN7yQw

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E test dependencies
        working-directory: tests/typescript
        run: npm install

      - name: Run E2E tests against live validator
        working-directory: tests/typescript
        run: npm test

  verifiable-build:
    needs: unit-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install solana-verify
        run: cargo install solana-verify --version 0.4.11

      - name: Build verifiable binary
        run: solana-verify build --library-name chiefliquidity

      - name: Print executable hash
        run: solana-verify get-executable-hash target/deploy/chiefliquidity.so

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiefliquidity-verifiable
          path: target/deploy/chiefliquidity.so
          retention-days: 90
